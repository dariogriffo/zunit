name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  checks: write        # required by dorny/test-reporter to create check runs
  pull-requests: write # required by dorny/test-reporter to annotate PRs

jobs:
  test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      # zunit's own internal tests, driven by zunit's runner (dogfood).
      # `-- --output-file …` emits JUnit XML for CI reporting.
      - name: zunit internal tests
        run: zig build test -- --output-dir zig-out/tests --consolidate-artifacts=true

      # Upload both XMLs as artifacts for later inspection.
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.os }}
          path: |
            test-results.xml
            zig-out/tests/test-results.xml
          retention-days: 30

      # Publish JUnit results as a GitHub check — shows pass/fail per test
      # case in the "Checks" tab of the PR and in the job summary. Passing
      # multiple paths surfaces both reports under one check.
      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results (${{ matrix.os }})
          path: |
            zig-out/tests/test-results.xml
          reporter: java-junit
          fail-on-error: false

      # Write a compact markdown table to the job summary page. Aggregates
      # counts from every JUnit XML produced by this workflow.
      - name: Write job summary
        if: always()
        shell: bash
        run: |
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET, os, sys

          reports = [
              ("Internal tests", "zig-out/tests/test-results.xml"),
          ]

          lines = ["## Test Results\n"]
          lines.append("| Report | ✅ Passed | ❌ Failed | ⏭ Skipped | Total |")
          lines.append("|--------|-----------|-----------|-----------|-------|")

          grand_total = grand_fail = grand_skip = 0
          failed_details = []

          for label, path in reports:
              if not os.path.exists(path):
                  lines.append(f"| {label} | — | — | — | _missing_ |")
                  continue
              root = ET.parse(path).getroot()
              total    = int(root.get("tests",    0))
              failures = int(root.get("failures", 0))
              skipped  = int(root.get("skipped",  0))
              passed   = total - failures - skipped
              lines.append(f"| {label} | {passed} | {failures} | {skipped} | {total} |")
              grand_total += total
              grand_fail  += failures
              grand_skip  += skipped

              if failures > 0:
                  for suite in root.findall("testsuite"):
                      for tc in suite.findall("testcase"):
                          fail = tc.find("failure")
                          if fail is not None:
                              name      = tc.get("name", "unknown")
                              classname = tc.get("classname", "")
                              msg       = fail.get("message", "test failed")
                              prefix    = f"**{classname}** › " if classname else ""
                              failed_details.append(f"- [{label}] {prefix}{name}: `{msg}`")

          grand_pass = grand_total - grand_fail - grand_skip
          lines.append(f"| **Total** | **{grand_pass}** | **{grand_fail}** | **{grand_skip}** | **{grand_total}** |")

          if failed_details:
              lines.append("\n### Failed Tests\n")
              lines.extend(failed_details)

          summary = os.environ.get("GITHUB_STEP_SUMMARY", "")
          if summary:
              with open(summary, "a") as f:
                  f.write("\n".join(lines) + "\n")
          else:
              print("\n".join(lines))
          EOF
